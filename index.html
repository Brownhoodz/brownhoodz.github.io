 <!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Brownhoodz</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0d0d0d;
color:white;
}

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.hero h1{
font-size:90px;
letter-spacing:8px;
margin-bottom:15px;
}

.hero p{
font-size:24px;
color:#bdbdbd;
margin-bottom:35px;
}

.btn{
text-decoration:none;
background:white;
color:black;
padding:15px 35px;
border-radius:40px;
font-weight:bold;
transition:0.3s;
}

.btn:hover{
transform:scale(1.08);
}

.section{
padding:80px 10%;
text-align:center;
}

.section h2{
font-size:45px;
margin-bottom:40px;
}

.cards{
display:flex;
gap:25px;
justify-content:center;
flex-wrap:wrap;
}

.card{
background:#181818;
padding:35px;
border-radius:20px;
width:250px;
transition:0.3s;
}

.card:hover{
transform:translateY(-10px);
}

.card h3{
margin-bottom:15px;
font-size:28px;
}

.card p{
color:#bdbdbd;
}

.insta{
text-align:center;
padding:80px 20px;
}

.insta a{
color:white;
font-size:28px;
text-decoration:none;
}

footer{
padding:30px;
text-align:center;
color:#888;
}

@media(max-width:768px){

.hero h1{
font-size:55px;
}

.hero p{
font-size:18px;
}

.section h2{
font-size:35px;
}

}

</style>

</head>

<body>

<div class="hero">

<h1>BROWNHOODZ</h1>

<p>THE STREET IS YOUR RUNWAY</p>

<a class="btn" href="https://instagram.com/brownhoodz" target="_blank">
SHOP NOW
</a>

</div>


<div class="section">

<h2>Featured Collection</h2>

<div class="cards">

<div class="card">

<h3>Oversized Tees</h3>

<p>Comfort meets street culture.</p>

</div>

<div class="card">

<h3>Vintage Hoodies</h3>

<p>Wear the story. Own the street.</p>

</div>

<div class="card">

<h3>Street Essentials</h3>

<p>Designed for individuality.</p>

</div>

</div>

</div>


<div class="insta">

<h2>Follow Us</h2>

<br>

<a href="https://instagram.com/brownhoodz" target="_blank">

@brownhoodz

</a>

</div>


<footer>

© 2026 Brownhoodz. All rights reserved.

</footer>

</body>

</html>
