 <!DOCTYPE html>
<html>
<head>

<title>Brownhoodz</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Montserrat',sans-serif;
}

body{

background:
linear-gradient(
135deg,
#000000,
#18110e,
#3b261d
);

color:white;
overflow-x:hidden;

}

.hero{

height:100vh;

display:flex;
flex-direction:column;

justify-content:center;
align-items:center;

text-align:center;

padding:20px;

}

.logo{

width:90px;

height:90px;

object-fit:cover;

border-radius:50%;

margin-bottom:25px;

box-shadow:

0 0 25px rgba(255,255,255,.08);

}

h1{

font-size:95px;

font-weight:900;

letter-spacing:2px;

background:

linear-gradient(
90deg,
#ffffff,
#fffaf5,
#d7a57d
);

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;

}

.tag{

font-size:20px;

letter-spacing:4px;

margin-top:10px;

color:#f2e8df;

}

.desc{

max-width:700px;

font-size:18px;

line-height:1.8;

color:#e9e2dc;

margin-top:35px;

}

.buttons{

display:flex;

gap:20px;

margin-top:45px;

flex-wrap:wrap;

justify-content:center;

}

.btn{

padding:

18px 38px;

border-radius:50px;

text-decoration:none;

font-weight:700;

transition:.3s;

}

.insta{

background:

linear-gradient(

90deg,

#fff,

#e6c0a2

);

color:#2b1a12;

}

.insta:hover{

transform:

translateY(-5px);

}

.whatsapp{

border:

2px solid #d7a57d;

color:white;

}

.whatsapp:hover{

background:#d7a57d;

color:#000;

transform:

translateY(-5px);

}

.footer{

margin-top:70px;

color:#cfcfcf;

font-size:14px;

opacity:.8;

}

@media(max-width:700px){

h1{

font-size:55px;

}

.desc{

font-size:16px;

}

.logo{

width:70px;

height:70px;

}

}

</style>

</head>

<body>

<section class="hero">

<img src="bh.jpeg" class="logo">

<h1>BROWNHOODZ</h1>

<p class="tag">

THE STREET IS YOUR RUNWAY

</p>

<p class="desc">

Curated thrifted streetwear for those who move differently.

Rare finds. Timeless style.

Own your story.

</p>

<div class="buttons">

<a

class="btn insta"

href="https://instagram.com/brownhoodz"

target="_blank">

FOLLOW @BROWNHOODZ

</a>

<a

class="btn whatsapp"

href="https://wa.me/917034280825"

target="_blank">

WHATSAPP US

</a>

</div>

<div class="footer">

© 2026 Brownhoodz

</div>

</section>

</body>

</html>
