 <!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Brownhoodz</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;900&display=swap" rel="stylesheet">

<style>

*{

margin:0;

padding:0;

box-sizing:border-box;

font-family:'Montserrat',sans-serif;

}

body{

background:

linear-gradient(

135deg,

#000,

#151515,

#2c1c14

);

min-height:100vh;

overflow-x:hidden;

color:white;

}


.logo{

position:absolute;

top:30px;

left:40px;

width:70px;

height:70px;

border-radius:50%;

object-fit:cover;

box-shadow:

0 0 20px rgba(255,255,255,.12);

}


.hero{

height:100vh;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

text-align:center;

padding:25px;

}


h1{

font-size:95px;

font-weight:900;

letter-spacing:3px;

background:

linear-gradient(

90deg,

#ffffff,

#ffffff,

#d6a27c

);

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;

}


.tagline{

margin-top:10px;

font-size:20px;

letter-spacing:4px;

color:#f5f5f5;

}


.desc{

margin-top:35px;

max-width:700px;

font-size:20px;

line-height:1.8;

color:#e7e7e7;

}


.buttons{

display:flex;

gap:20px;

margin-top:50px;

flex-wrap:wrap;

justify-content:center;

}


.btn{

padding:

18px 38px;

border-radius:50px;

text-decoration:none;

font-weight:700;

transition:0.3s;

}


.insta{

background:white;

color:black;

}


.insta:hover{

transform:

translateY(-5px);

box-shadow:

0 0 30px rgba(255,255,255,.2);

}


.whatsapp{

border:

2px solid #d6a27c;

color:white;

}


.whatsapp:hover{

background:#d6a27c;

color:black;

transform:

translateY(-5px);

}


.footer{

position:absolute;

bottom:25px;

width:100%;

text-align:center;

font-size:14px;

color:#cfcfcf;

opacity:.7;

}


@media(max-width:768px){

.logo{

width:55px;

height:55px;

left:20px;

top:20px;

}

h1{

font-size:55px;

}

.tagline{

font-size:16px;

}

.desc{

font-size:16px;

}

}

</style>

</head>

<body>


<img src="bh.jpeg" class="logo">


<section class="hero">

<h1>

BROWNHOODZ

</h1>

<p class="tagline">

THE STREET IS YOUR RUNWAY

</p>


<p class="desc">

Curated thrifted streetwear for those who move differently.

Rare finds.

Timeless style.

Own your story.

</p>


<div class="buttons">

<a

class="btn insta"

href="https://instagram.com/brownhoodz"

target="_blank">

FOLLOW @BROWNHOODZ

</a>


<a

class="btn whatsapp"

href="https://wa.me/917034280825"

target="_blank">

WHATSAPP US

</a>

</div>

</section>


<div class="footer">

© 2026 Brownhoodz

</div>


</body>

</html>
