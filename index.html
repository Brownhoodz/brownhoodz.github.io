<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Brownhoodz</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Montserrat',sans-serif;
}

body{
    margin:0;
    font-family:'Montserrat',sans-serif;
    background:linear-gradient(
        135deg,
        #ffffff 0%,
        #f5f2ef 50%,
        #2b1b14 100%
    );
    color:white;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.container{
    max-width:900px;
    padding:40px;
}

.logo img{
    width:120px;
    margin-bottom:20px;
}

h1{
    font-size:90px;
    font-weight:900;
    letter-spacing:6px;
    margin:0;
    color:white;
}

h2{
    font-size:28px;
    font-weight:500;
    letter-spacing:4px;
    margin-top:15px;
    color:#d7b08a;
}

p{
    font-size:22px;
    line-height:1.8;
    max-width:700px;
    margin:40px auto;
    color:#f5f5f5;
}

.buttons{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
}

.btn{
    background:#d7b08a;
    color:#111;
    text-decoration:none;
    padding:18px 35px;
    border-radius:50px;
    font-weight:700;
}

.btn-outline{
    border:2px solid #d7b08a;
    color:white;
    text-decoration:none;
    padding:18px 35px;
    border-radius:50px;
    font-weight:700;
}

.contact{
    margin-top:40px;
    font-size:18px;
    color:#d7b08a;
}

.hero{

height:100vh;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

text-align:center;

padding:20px;

}

h1{

font-size:100px;

font-weight:900;

letter-spacing:8px;

background:linear-gradient(
to right,
#ffffff,
#f4e1c1,
#9b6a43
);

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;

text-shadow:0 0 30px rgba(255,255,255,0.15);

}

.tagline{

font-size:30px;

margin-top:10px;

letter-spacing:4px;

color:#f2d8b3;

}

.description{

margin-top:35px;

max-width:700px;

font-size:20px;

line-height:1.8;

color:#d9c7b7;

}

.buttons{

margin-top:50px;

display:flex;

gap:25px;

flex-wrap:wrap;

justify-content:center;

}

.btn{

padding:18px 40px;

border-radius:50px;

font-size:18px;

font-weight:700;

text-decoration:none;

transition:0.3s;

}

.shop{

background:linear-gradient(

to right,

#7a5130,

#cfa77a

);

color:black;

}

.shop:hover{

transform:translateY(-6px);

box-shadow:

0 0 30px rgba(207,167,122,0.5);

}

.insta{

border:2px solid #d2b48c;

color:white;

}

.insta:hover{

background:#d2b48c;

color:black;

transform:translateY(-6px);

}

.scroll{

margin-top:80px;

font-size:18px;

color:#b89d7f;

animation:updown 1.5s infinite;

}

@keyframes updown{

0%{

transform:translateY(0);

}

50%{

transform:translateY(10px);

}

100%{

transform:translateY(0);

}

}

.collection{

padding:100px 30px;

text-align:center;

}

.collection h2{

font-size:50px;

margin-bottom:60px;

}

.cards{

display:flex;

justify-content:center;

gap:30px;

flex-wrap:wrap;

}

.card{

width:280px;

height:350px;

border-radius:25px;

background:

linear-gradient(

145deg,

#181818,

#3d291e

);

display:flex;

justify-content:center;

align-items:center;

font-size:28px;

font-weight:700;

transition:0.3s;

}

.card:hover{

transform:translateY(-10px);

box-shadow:

0 0 35px rgba(210,180,140,0.4);

}

footer{

text-align:center;

padding:50px;

color:#aaa;

}

@media(max-width:768px){

h1{

font-size:60px;

}

.tagline{

font-size:20px;

}

.description{

font-size:16px;

}

.collection h2{

font-size:35px;

}

}

</style>

</head>

<body>

<div class="container">

    <div class="logo">
        <img src="logo.png" alt="Brownhoodz Logo">
    </div>

    <h1>BROWNHOODZ</h1>

    <h2>THE STREET IS YOUR RUNWAY</h2>

    <p>
        Curated thrifted streetwear for those who move differently.
        Rare finds, timeless pieces, and everyday confidence.
        Every piece has a story. Find yours.
    </p>

    <div class="buttons">

        <a href="https://www.instagram.com/brownhoodz" class="btn">
            FOLLOW @BROWNHOODZ
        </a>

        <a href="https://wa.me/917034280825" class="btn-outline">
            WHATSAPP US
        </a>

    </div>

    <div class="contact">
        📞 +91 70342 80825
    </div>

</div>

</body>

</html>
