 <!DOCTYPE html>
<html>

<head>

<title>Brownhoodz</title>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700;900&display=swap" rel="stylesheet">

<style>

*{

margin:0;

padding:0;

box-sizing:border-box;

font-family:'Montserrat',sans-serif;

}

body{

background:

linear-gradient(

135deg,

#000000,

#1b120d,

#3c251b

);

min-height:100vh;

color:white;

overflow-x:hidden;

}

.top-logo{

position:absolute;

top:30px;

left:40px;

}

.logo{

width:65px;

height:65px;

border-radius:50%;

object-fit:cover;

box-shadow:

0 0 20px rgba(255,255,255,.08);

}

.hero{

height:100vh;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

text-align:center;

padding:20px;

}

h1{

font-size:95px;

font-weight:900;

letter-spacing:2px;

background:

linear-gradient(

90deg,

#ffffff,

#fffaf7,

#d6a27c

);

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;

}

.tagline{

margin-top:10px;

font-size:20px;

letter-spacing:4px;

color:#f7f2ee;

}

.desc{

margin-top:35px;

max-width:700px;

font-size:20px;

line-height:1.8;

color:#e8dfd8;

}

.buttons{

margin-top:45px;

display:flex;

gap:20px;

flex-wrap:wrap;

justify-content:center;

}

.btn{

padding:

18px 38px;

border-radius:50px;

text-decoration:none;

font-weight:700;

transition:.3s;

}

.insta{

background:

linear-gradient(

90deg,

#ffffff,

#f4eee9

);

color:#2b1b13;

}

.insta:hover{

transform:

translateY(-5px);

}

.whatsapp{

border:

2px solid #d6a27c;

color:white;

}

.whatsapp:hover{

background:#d6a27c;

color:black;

transform:

translateY(-5px);

}

.footer{

margin-top:70px;

font-size:14px;

color:#cfcfcf;

opacity:.8;

}

@media(max-width:700px){

.top-logo{

left:20px;

top:20px;

}

.logo{

width:55px;

height:55px;

}

h1{

font-size:55px;

}

.tagline{

font-size:16px;

}

.desc{

font-size:16px;

}

}

</style>

</head>

<body>

<div class="top-logo">

<img src="bh.jpeg" class="logo">

</div>

<section class="hero">

<h1>

BROWNHOODZ

</h1>

<p class="tagline">

THE STREET IS YOUR RUNWAY

</p>

<p class="desc">

Curated thrifted streetwear for those who move differently.

Rare finds. Timeless style.

Own your story.

</p>

<div class="buttons">

<a

class="btn insta"

href="https://instagram.com/brownhoodz"

target="_blank">

FOLLOW @BROWNHOODZ

</a>

<a

class="btn whatsapp"

href="https://wa.me/917034280825"

target="_blank">

WHATSAPP US

</a>

</div>

<div class="footer">

© 2026 Brownhoodz

</div>

</section>

</body>

</html>
