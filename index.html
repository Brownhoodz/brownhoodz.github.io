<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Brownhoodz</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Montserrat',sans-serif;
}

body{

background:#0f0f0f;
color:white;

}

.hero{

height:100vh;

background:

linear-gradient(
rgba(0,0,0,0.55),
rgba(0,0,0,0.75)
),

url('hero.jpg.jpeg');

background-size:cover;
background-position:center;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

text-align:center;

position:relative;

}

.logo{

position:absolute;

top:30px;

left:40px;

width:75px;

height:75px;

border-radius:50%;

object-fit:cover;

}

h1{

font-size:95px;

font-weight:900;

background:linear-gradient(

90deg,

#ffffff,

#fff8f2,

#d6a57a

);

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;

}

.tag{

margin-top:15px;

letter-spacing:5px;

font-size:18px;

font-weight:500;

}

.desc{

max-width:700px;

margin-top:30px;

font-size:24px;

line-height:1.8;

color:#f2f2f2;

}

.buttons{

margin-top:45px;

display:flex;

gap:25px;

}

.btn1{

background:white;

color:black;

padding:18px 42px;

border-radius:50px;

text-decoration:none;

font-weight:700;

transition:.3s;

}

.btn1:hover{

transform:translateY(-5px);

}

.btn2{

padding:18px 42px;

border:2px solid #d6a57a;

color:white;

text-decoration:none;

border-radius:50px;

font-weight:700;

transition:.3s;

}

.btn2:hover{

background:#d6a57a;

color:black;

}

.products{

padding:120px 10%;

background:#111;

}

.sectiontitle{

font-size:45px;

text-align:center;

margin-bottom:70px;

}

.grid{

display:grid;

grid-template-columns:

repeat(auto-fit,minmax(280px,1fr));

gap:35px;

}

.card{

background:#181818;

border-radius:20px;

overflow:hidden;

transition:.4s;

}

.card:hover{

transform:

translateY(-10px)

scale(1.02);

}

.card img{

width:100%;

height:380px;

object-fit:cover;

}

.card h3{

padding:25px;

font-size:25px;

}

footer{

padding:60px;

text-align:center;

background:#0d0d0d;

}

.socials a{

color:white;

text-decoration:none;

margin:20px;

font-size:20px;

}

html{

scroll-behavior:smooth;

}

</style>

</head>

<body>

<section class="hero">

<img src="bh.jpeg" class="logo">

<h1>BROWNHOODZ</h1>

<p class="tag">

THE STREET IS YOUR RUNWAY

</p>

<p class="desc">

Curated thrifted streetwear for those who move differently.

Rare finds.

Timeless style.

Own your story.

</p>

<div class="buttons">

<a href="#products" class="btn1">

SHOP NOW

</a>

<a href="https://instagram.com/brownhoodz"

class="btn2">

FOLLOW @BROWNHOODZ

</a>

</div>

</section>

<section class="products" id="products">

<h2 class="sectiontitle">

Rare Finds

</h2>

<div class="grid">

<div class="card">

<img src="rare.jpg.jpeg">

<h3>Rare Collection</h3>

</div>

<div class="card">

<img src="hoodie.jpg.jpeg">

<h3>Hoodies</h3>

</div>

<div class="card">

<img src="tee.jpg.jpeg">

<h3>Graphic Tees</h3>

</div>

</div>

</section>

<footer>

<div class="socials">

<a href="https://instagram.com/brownhoodz">

Instagram

</a>

<a href="#">

WhatsApp

</a>

</div>

<br>

© 2026 Brownhoodz

</footer>

</body>

</html>
