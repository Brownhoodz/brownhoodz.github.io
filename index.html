 <!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Brownhoodz</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Montserrat',sans-serif;
}

body{

background:linear-gradient(
135deg,
#000000,
#1c1a17,
#3e2c20
);

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

color:white;

}

.container{

text-align:center;
padding:40px;

}

.logo{

font-size:90px;
font-weight:900;

letter-spacing:8px;

background:linear-gradient(
to right,
#ffffff,
#d2b48c,
#8b5e3c
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

margin-bottom:20px;

}

.tagline{

font-size:28px;

font-weight:500;

letter-spacing:3px;

color:#f2e3d5;

margin-bottom:45px;

}

.description{

max-width:700px;

margin:auto;

font-size:18px;

line-height:1.8;

color:#d9c7b7;

margin-bottom:50px;

}

.buttons{

display:flex;

justify-content:center;

gap:20px;

flex-wrap:wrap;

}

.btn{

text-decoration:none;

padding:18px 40px;

border-radius:50px;

font-weight:700;

font-size:16px;

transition:0.3s;

}

.shop{

background:linear-gradient(
to right,
#8b5e3c,
#d2b48c
);

color:black;

}

.shop:hover{

transform:translateY(-5px);

box-shadow:0 10px 30px rgba(210,180,140,0.4);

}

.insta{

border:2px solid #d2b48c;

color:white;

}

.insta:hover{

background:#d2b48c;

color:black;

transform:translateY(-5px);

}

footer{

margin-top:70px;

font-size:14px;

color:#aaa;

}

@media(max-width:768px){

.logo{

font-size:55px;

}

.tagline{

font-size:20px;

}

.description{

font-size:16px;

}

}

</style>

</head>

<body>

<div class="container">

<h1 class="logo">
BROWNHOODZ
</h1>

<p class="tagline">
THE STREET IS YOUR RUNWAY
</p>

<p class="description">

Brownhoodz is more than clothing.

It's confidence, individuality and street culture combined into timeless pieces made for those who dare to stand out.

Wear your story.

</p>

<div class="buttons">

<a class="btn shop"
href="https://instagram.com/brownhoodz"
target="_blank">

SHOP NOW

</a>


<a class="btn insta"
href="https://instagram.com/brownhoodz"
target="_blank">

FOLLOW @BROWNHOODZ

</a>

</div>

<footer>

© 2026 Brownhoodz

</footer>

</div>

</body>

</html>
