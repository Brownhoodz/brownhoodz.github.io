<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Brownhoodz</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Montserrat',sans-serif;
}

body{

background:
linear-gradient(
135deg,
#000000,
#1c140e,
#5b3a29
);

color:white;

overflow-x:hidden;

}

.hero{

height:100vh;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

text-align:center;

padding:20px;

}

h1{

font-size:100px;

font-weight:900;

letter-spacing:8px;

background:linear-gradient(
to right,
#ffffff,
#f4e1c1,
#9b6a43
);

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;

text-shadow:0 0 30px rgba(255,255,255,0.15);

}

.tagline{

font-size:30px;

margin-top:10px;

letter-spacing:4px;

color:#f2d8b3;

}

.description{

margin-top:35px;

max-width:700px;

font-size:20px;

line-height:1.8;

color:#d9c7b7;

}

.buttons{

margin-top:50px;

display:flex;

gap:25px;

flex-wrap:wrap;

justify-content:center;

}

.btn{

padding:18px 40px;

border-radius:50px;

font-size:18px;

font-weight:700;

text-decoration:none;

transition:0.3s;

}

.shop{

background:linear-gradient(

to right,

#7a5130,

#cfa77a

);

color:black;

}

.shop:hover{

transform:translateY(-6px);

box-shadow:

0 0 30px rgba(207,167,122,0.5);

}

.insta{

border:2px solid #d2b48c;

color:white;

}

.insta:hover{

background:#d2b48c;

color:black;

transform:translateY(-6px);

}

.scroll{

margin-top:80px;

font-size:18px;

color:#b89d7f;

animation:updown 1.5s infinite;

}

@keyframes updown{

0%{

transform:translateY(0);

}

50%{

transform:translateY(10px);

}

100%{

transform:translateY(0);

}

}

.collection{

padding:100px 30px;

text-align:center;

}

.collection h2{

font-size:50px;

margin-bottom:60px;

}

.cards{

display:flex;

justify-content:center;

gap:30px;

flex-wrap:wrap;

}

.card{

width:280px;

height:350px;

border-radius:25px;

background:

linear-gradient(

145deg,

#181818,

#3d291e

);

display:flex;

justify-content:center;

align-items:center;

font-size:28px;

font-weight:700;

transition:0.3s;

}

.card:hover{

transform:translateY(-10px);

box-shadow:

0 0 35px rgba(210,180,140,0.4);

}

footer{

text-align:center;

padding:50px;

color:#aaa;

}

@media(max-width:768px){

h1{

font-size:60px;

}

.tagline{

font-size:20px;

}

.description{

font-size:16px;

}

.collection h2{

font-size:35px;

}

}

</style>

</head>

<body>

<section class="hero">

<h1>

BROWNHOODZ

</h1>

<p class="tagline">

THE STREET IS YOUR RUNWAY

</p>

<p class="description">

Brownhoodz isn't just clothing.

It's confidence, individuality and street culture woven into timeless pieces.

Wear your story.

Own your streets.

</p>

<div class="buttons">

<a class="btn shop"

href="https://instagram.com/brownhoodz"

target="_blank">

SHOP NOW

</a>

<a class="btn insta"

href="https://instagram.com/brownhoodz"

target="_blank">

@BROWNHOODZ

</a>

</div>

<div class="scroll">

↓ Scroll ↓

</div>

</section>


<section class="collection">

<h2>

Featured Collection

</h2>

<div class="cards">

<div class="card">

HOODIES

</div>

<div class="card">

OVERSIZED

</div>

<div class="card">

STREETWEAR

</div>

</div>

</section>

<footer>

© 2026 Brownhoodz

</footer>

</body>

</html>
